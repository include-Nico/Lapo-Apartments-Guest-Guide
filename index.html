*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#9A7A35;
  --navy:#1E2B3A;--navy-mid:#2C3E52;
  --cream:#F5F0E8;--cream-dark:#EDE6D6;
  --white:#FFFFFF;--muted:#8A8070;
  --border:rgba(201,168,76,0.18);--radius:18px;
  --shadow:0 4px 24px rgba(30,43,58,0.13);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;overflow-x:hidden}

/* LANG FAB */
.lang-fab{position:fixed;bottom:20px;right:18px;width:48px;height:48px;border-radius:50%;background:var(--navy);border:1.5px solid var(--gold-dim);color:var(--gold);font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.35);transition:background .2s,border-color .2s}
.lang-fab:hover{background:var(--navy-mid);border-color:var(--gold)}
.lang-drawer{position:fixed;bottom:136px;right:18px;background:var(--navy);border:1px solid var(--gold-dim);border-radius:14px;padding:10px 8px;display:flex;flex-direction:column;gap:6px;z-index:199;box-shadow:0 8px 32px rgba(0,0,0,0.4);opacity:0;transform:translateY(10px) scale(0.95);pointer-events:none;transition:opacity .22s ease,transform .22s ease}
.lang-drawer.open{opacity:1;transform:none;pointer-events:all}
.lang-btn{background:transparent;border:1px solid rgba(201,168,76,0.25);color:rgba(255,255,255,0.7);padding:7px 16px;border-radius:20px;font-size:0.82rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s;font-weight:500;text-align:left;white-space:nowrap}
.lang-btn:hover{border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,0.08)}
.lang-btn.active{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700}

.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to bottom, rgba(30,43,58,0.72) 0%, rgba(30,43,58,0.82) 60%, rgba(30,43,58,0.95) 100%);pointer-events:none}
/* NUOVA REGOLA: Mantiene il contenuto dell'header sopra la sfumatura scura */
.header > * { position: relative; z-index: 1; }

.logo-wrap{display:flex;justify-content:center;margin-bottom:14px}
.logo-img{width:180px;height:180px;object-fit:contain}

/* NUOVA REGOLA: Rende bianca la scritta "Guida Ospiti" */
.header-eyebrow { font-size: .8rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--white); margin-bottom: 6px; }

/* MODIFICA: Rende bianco il titolo principale */
.header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,6vw,2.6rem);font-weight:700;color:var(--white);line-height:1.1;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.9),0 0 30px rgba(0,0,0,0.8)}

.header-address{font-size:.8rem;color:rgba(255,255,255,0.7);font-weight:300;letter-spacing:.06em}
.gold-line{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 0}

/* HOST FAB */
.host-fab{position:fixed;bottom:78px;right:18px;width:48px;height:48px;border-radius:50%;background:#25D366;border:1.5px solid rgba(255,255,255,0.3);color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;box-shadow:0 4px 16px rgba(37,211,102,0.5);transition:background .2s,transform .2s}
.host-fab:hover{background:#1eae57;transform:scale(1.08)}
.host-drawer{position:fixed;bottom:136px;right:18px;background:var(--navy);border:1px solid var(--gold-dim);border-radius:14px;padding:10px 8px;display:flex;flex-direction:column;gap:6px;z-index:199;box-shadow:0 8px 32px rgba(0,0,0,0.4);opacity:0;transform:translateY(10px) scale(0.95);pointer-events:none;transition:opacity .22s ease,transform .22s ease;min-width:160px}
.host-drawer.open{opacity:1;transform:none;pointer-events:all}
.host-drawer-label{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);padding:2px 10px 4px;border-bottom:1px solid rgba(201,168,76,0.15);margin-bottom:2px}
.host-action-btn{display:flex;align-items:center;gap:10px;background:transparent;border:1px solid rgba(201,168,76,0.25);color:rgba(255,255,255,0.8);padding:9px 14px;border-radius:10px;font-size:.83rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s;font-weight:500;text-align:left;white-space:nowrap;text-decoration:none;width:100%}
.host-action-btn i{font-size:1rem;width:16px;text-align:center}
.host-action-btn.wa{border-color:rgba(37,211,102,0.4);color:#4ee58a}
.host-action-btn.wa:hover{background:rgba(37,211,102,0.12);border-color:#25D366}
.host-action-btn.call{border-color:rgba(201,168,76,0.4);color:var(--gold-light)}
.host-action-btn.call:hover{background:rgba(201,168,76,0.12);border-color:var(--gold)}

/* INTRO */
.intro-strip{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:10px;font-size:.83rem;color:rgba(255,255,255,0.55)}
.intro-strip i{color:var(--gold);font-size:.9rem;flex-shrink:0}

/* CONTAINER */
.container{max-width:680px;margin:0 auto;padding:20px 14px 80px}

/* CARDS */
.section-card{background:var(--white);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);opacity:0;transform:translateY(16px);animation:fadeUp .5s forwards}
.section-card:nth-child(1){animation-delay:.08s}
.section-card:nth-child(2){animation-delay:.16s}
.section-card:nth-child(3){animation-delay:.24s}
.section-card:nth-child(4){animation-delay:.32s}
@keyframes fadeUp{to{opacity:1;transform:none}}

.section-header{display:flex;align-items:center;gap:14px;padding:17px 18px;cursor:pointer;user-select:none;transition:background .2s}
.section-header:hover{background:var(--cream)}
.section-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;color:white}
.section-meta{flex:1}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;line-height:1.2;color:var(--navy)}
.section-subtitle{font-size:.75rem;color:var(--muted);margin-top:2px;font-weight:400}
.section-toggle{width:30px;height:30px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--muted);transition:transform .35s ease,background .2s,color .2s;flex-shrink:0}
.section-card.open .section-toggle{transform:rotate(180deg);background:var(--navy);color:var(--gold)}

.section-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.25,.46,.45,.94)}
.section-card.open .section-body{max-height:2400px}
.section-body-inner{padding:0 18px 20px;border-top:1px solid var(--cream-dark)}

/* TRANSPORT */
.transport-block{margin-top:16px}
.block-label{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.block-label::after{content:'';flex:1;height:1px;background:var(--border)}
.transport-step{display:flex;gap:12px;margin-bottom:13px;align-items:flex-start}
.step-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:5px}
.step-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0}
.step-connector{width:1px;flex:1;background:var(--border);margin:4px 0;min-height:14px}
.step-content{flex:1}
.step-title{font-size:.88rem;font-weight:600;margin-bottom:3px;color:var(--navy);display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.step-desc{font-size:.81rem;color:var(--muted);line-height:1.55}
.step-desc strong{color:var(--navy);font-weight:600}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.02em;color:white}
.badge-m1{background:#D93025}.badge-m2{background:#00A651}.badge-m3{background:#F5C400;color:#1a1a1a}.badge-m5{background:#9B8EC4}.badge-tram{background:var(--navy-mid)}

/* HIGHLIGHTS */
.highlights-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.highlight-item{background:var(--cream);border-radius:10px;padding:11px 12px;font-size:.8rem;border:1px solid var(--cream-dark);color:var(--navy);line-height:1.4}
.highlight-item strong{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-dim);margin-bottom:3px;font-weight:700}

/* MAP BTN */
.btn-map{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--navy);text-decoration:none;padding:13px 20px;border-radius:11px;font-weight:700;font-size:.87rem;margin-top:18px;transition:opacity .2s,transform .2s;letter-spacing:.03em;background:linear-gradient(135deg,var(--gold-light),var(--gold))}
.btn-map:active{opacity:.85;transform:scale(0.98)}

/* DIVIDER */
.divider{height:1px;background:var(--cream-dark);margin:14px 0}

/* TIP BOX */
.tip-box{background:var(--navy);border:1px solid var(--gold-dim);border-radius:var(--radius);padding:18px;margin-top:20px}
.tip-box-title{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;font-weight:700}
.tip-item{display:flex;gap:12px;margin-bottom:0;font-size:.83rem;line-height:1.55;color:rgba(255,255,255,0.78);padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.1);align-items:flex-start}
.tip-item:last-child{border-bottom:none;padding-bottom:0}
.tip-item:first-child{padding-top:0}
.tip-icon{width:28px;height:28px;border-radius:8px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tip-icon i{color:var(--gold);font-size:.75rem}
.tip-item strong{color:var(--gold-light)}
</style>
</head>

.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to bottom, rgba(30,43,58,0.72) 0%, rgba(30,43,58,0.82) 60%, rgba(30,43,58,0.95) 100%);pointer-events:none}
/* NUOVA REGOLA PER PORTARE GLI ELEMENTI IN PRIMO PIANO RISPETTO ALLA SFUMATURA SCURA */
.header > * {position:relative; z-index:1}

.logo-wrap{display:flex;justify-content:center;margin-bottom:14px}
.logo-img{width:180px;height:180px;object-fit:contain}

/* COLORE BIANCO PER L'EYEBROW (Guida Ospiti) */
.header-eyebrow{color:var(--white);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:8px;}

/* COLORE BIANCO PER IL TITOLO PRINCIPALE */
.header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,6vw,2.6rem);font-weight:700;color:var(--white);line-height:1.1;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.9),0 0 30px rgba(0,0,0,0.8)}

.header-address{font-size:.8rem;color:rgba(255,255,255,0.7);font-weight:300;letter-spacing:.06em}
.gold-line{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 0}

/* HOST FAB */
.host-fab{position:fixed;bottom:78px;right:18px;width:48px;height:48px;border-radius:50%;background:#25D366;border:1.5px solid rgba(255,255,255,0.3);color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;box-shadow:0 4px 16px rgba(37,211,102,0.5);transition:background .2s,transform .2s}
.host-fab:hover{background:#1eae57;transform:scale(1.08)}
.host-drawer{position:fixed;bottom:136px;right:18px;background:var(--navy);border:1px solid var(--gold-dim);border-radius:14px;padding:10px 8px;display:flex;flex-direction:column;gap:6px;z-index:199;box-shadow:0 8px 32px rgba(0,0,0,0.4);opacity:0;transform:translateY(10px) scale(0.95);pointer-events:none;transition:opacity .22s ease,transform .22s ease;min-width:160px}
.host-drawer.open{opacity:1;transform:none;pointer-events:all}
.host-drawer-label{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);padding:2px 10px 4px;border-bottom:1px solid rgba(201,168,76,0.15);margin-bottom:2px}
.host-action-btn{display:flex;align-items:center;gap:10px;background:transparent;border:1px solid rgba(201,168,76,0.25);color:rgba(255,255,255,0.8);padding:9px 14px;border-radius:10px;font-size:.83rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s;font-weight:500;text-align:left;white-space:nowrap;text-decoration:none;width:100%}
.host-action-btn i{font-size:1rem;width:16px;text-align:center}
.host-action-btn.wa{border-color:rgba(37,211,102,0.4);color:#4ee58a}
.host-action-btn.wa:hover{background:rgba(37,211,102,0.12);border-color:#25D366}
.host-action-btn.call{border-color:rgba(201,168,76,0.4);color:var(--gold-light)}
.host-action-btn.call:hover{background:rgba(201,168,76,0.12);border-color:var(--gold)}

/* INTRO */
.intro-strip{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:10px;font-size:.83rem;color:rgba(255,255,255,0.55)}
.intro-strip i{color:var(--gold);font-size:.9rem;flex-shrink:0}

/* CONTAINER */
.container{max-width:680px;margin:0 auto;padding:20px 14px 80px}

/* CARDS */
.section-card{background:var(--white);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);opacity:0;transform:translateY(16px);animation:fadeUp .5s forwards}
.section-card:nth-child(1){animation-delay:.08s}
.section-card:nth-child(2){animation-delay:.16s}
.section-card:nth-child(3){animation-delay:.24s}
.section-card:nth-child(4){animation-delay:.32s}
@keyframes fadeUp{to{opacity:1;transform:none}}

.section-header{display:flex;align-items:center;gap:14px;padding:17px 18px;cursor:pointer;user-select:none;transition:background .2s}
.section-header:hover{background:var(--cream)}
.section-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;color:white}
.section-meta{flex:1}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;line-height:1.2;color:var(--navy)}
.section-subtitle{font-size:.75rem;color:var(--muted);margin-top:2px;font-weight:400}
.section-toggle{width:30px;height:30px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--muted);transition:transform .35s ease,background .2s,color .2s;flex-shrink:0}
.section-card.open .section-toggle{transform:rotate(180deg);background:var(--navy);color:var(--gold)}

.section-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.25,.46,.45,.94)}
.section-card.open .section-body{max-height:2400px}
.section-body-inner{padding:0 18px 20px;border-top:1px solid var(--cream-dark)}

/* TRANSPORT */
.transport-block{margin-top:16px}
.block-label{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.block-label::after{content:'';flex:1;height:1px;background:var(--border)}
.transport-step{display:flex;gap:12px;margin-bottom:13px;align-items:flex-start}
.step-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:5px}
.step-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0}
.step-connector{width:1px;flex:1;background:var(--border);margin:4px 0;min-height:14px}
.step-content{flex:1}
.step-title{font-size:.88rem;font-weight:600;margin-bottom:3px;color:var(--navy);display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.step-desc{font-size:.81rem;color:var(--muted);line-height:1.55}
.step-desc strong{color:var(--navy);font-weight:600}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.02em;color:white}
.badge-m1{background:#D93025}.badge-m2{background:#00A651}.badge-m3{background:#F5C400;color:#1a1a1a}.badge-m5{background:#9B8EC4}.badge-tram{background:var(--navy-mid)}

/* HIGHLIGHTS */
.highlights-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.highlight-item{background:var(--cream);border-radius:10px;padding:11px 12px;font-size:.8rem;border:1px solid var(--cream-dark);color:var(--navy);line-height:1.4}
.highlight-item strong{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-dim);margin-bottom:3px;font-weight:700}

/* MAP BTN */
.btn-map{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--navy);text-decoration:none;padding:13px 20px;border-radius:11px;font-weight:700;font-size:.87rem;margin-top:18px;transition:opacity .2s,transform .2s;letter-spacing:.03em;background:linear-gradient(135deg,var(--gold-light),var(--gold))}
.btn-map:active{opacity:.85;transform:scale(0.98)}

/* DIVIDER */
.divider{height:1px;background:var(--cream-dark);margin:14px 0}

/* TIP BOX */
.tip-box{background:var(--navy);border:1px solid var(--gold-dim);border-radius:var(--radius);padding:18px;margin-top:20px}
.tip-box-title{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;font-weight:700}
.tip-item{display:flex;gap:12px;margin-bottom:0;font-size:.83rem;line-height:1.55;color:rgba(255,255,255,0.78);padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.1);align-items:flex-start}
.tip-item:last-child{border-bottom:none;padding-bottom:0}
.tip-item:first-child{padding-top:0}
.tip-icon{width:28px;height:28px;border-radius:8px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tip-icon i{color:var(--gold);font-size:.75rem}
.tip-item strong{color:var(--gold-light)}
</style>
</head>

.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to bottom, rgba(30,43,58,0.72) 0%, rgba(30,43,58,0.82) 60%, rgba(30,43,58,0.95) 100%);pointer-events:none}
/* NUOVA REGOLA PER PORTARE GLI ELEMENTI IN PRIMO PIANO RISPETTO ALLA SFUMATURA SCURA */
.header > * {position:relative; z-index:1}

.logo-wrap{display:flex;justify-content:center;margin-bottom:14px}
.logo-img{width:180px;height:180px;object-fit:contain}

/* COLORE BIANCO PER L'EYEBROW (Guida Ospiti) */
.header-eyebrow{color:var(--white);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:8px;}

/* COLORE BIANCO PER IL TITOLO PRINCIPALE */
.header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,6vw,2.6rem);font-weight:700;color:var(--white);line-height:1.1;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.9),0 0 30px rgba(0,0,0,0.8)}

.header-address{font-size:.8rem;color:rgba(255,255,255,0.7);font-weight:300;letter-spacing:.06em}
.gold-line{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 0}

/* HOST FAB */
.host-fab{position:fixed;bottom:78px;right:18px;width:48px;height:48px;border-radius:50%;background:#25D366;border:1.5px solid rgba(255,255,255,0.3);color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;box-shadow:0 4px 16px rgba(37,211,102,0.5);transition:background .2s,transform .2s}
.host-fab:hover{background:#1eae57;transform:scale(1.08)}
.host-drawer{position:fixed;bottom:136px;right:18px;background:var(--navy);border:1px solid var(--gold-dim);border-radius:14px;padding:10px 8px;display:flex;flex-direction:column;gap:6px;z-index:199;box-shadow:0 8px 32px rgba(0,0,0,0.4);opacity:0;transform:translateY(10px) scale(0.95);pointer-events:none;transition:opacity .22s ease,transform .22s ease;min-width:160px}
.host-drawer.open{opacity:1;transform:none;pointer-events:all}
.host-drawer-label{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);padding:2px 10px 4px;border-bottom:1px solid rgba(201,168,76,0.15);margin-bottom:2px}
.host-action-btn{display:flex;align-items:center;gap:10px;background:transparent;border:1px solid rgba(201,168,76,0.25);color:rgba(255,255,255,0.8);padding:9px 14px;border-radius:10px;font-size:.83rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s;font-weight:500;text-align:left;white-space:nowrap;text-decoration:none;width:100%}
.host-action-btn i{font-size:1rem;width:16px;text-align:center}
.host-action-btn.wa{border-color:rgba(37,211,102,0.4);color:#4ee58a}
.host-action-btn.wa:hover{background:rgba(37,211,102,0.12);border-color:#25D366}
.host-action-btn.call{border-color:rgba(201,168,76,0.4);color:var(--gold-light)}
.host-action-btn.call:hover{background:rgba(201,168,76,0.12);border-color:var(--gold)}

/* INTRO */
.intro-strip{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:10px;font-size:.83rem;color:rgba(255,255,255,0.55)}
.intro-strip i{color:var(--gold);font-size:.9rem;flex-shrink:0}

/* CONTAINER */
.container{max-width:680px;margin:0 auto;padding:20px 14px 80px}

/* CARDS */
.section-card{background:var(--white);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);opacity:0;transform:translateY(16px);animation:fadeUp .5s forwards}
.section-card:nth-child(1){animation-delay:.08s}
.section-card:nth-child(2){animation-delay:.16s}
.section-card:nth-child(3){animation-delay:.24s}
.section-card:nth-child(4){animation-delay:.32s}
@keyframes fadeUp{to{opacity:1;transform:none}}

.section-header{display:flex;align-items:center;gap:14px;padding:17px 18px;cursor:pointer;user-select:none;transition:background .2s}
.section-header:hover{background:var(--cream)}
.section-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;color:white}
.section-meta{flex:1}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;line-height:1.2;color:var(--navy)}
.section-subtitle{font-size:.75rem;color:var(--muted);margin-top:2px;font-weight:400}
.section-toggle{width:30px;height:30px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--muted);transition:transform .35s ease,background .2s,color .2s;flex-shrink:0}
.section-card.open .section-toggle{transform:rotate(180deg);background:var(--navy);color:var(--gold)}

.section-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.25,.46,.45,.94)}
.section-card.open .section-body{max-height:2400px}
.section-body-inner{padding:0 18px 20px;border-top:1px solid var(--cream-dark)}

/* TRANSPORT */
.transport-block{margin-top:16px}
.block-label{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.block-label::after{content:'';flex:1;height:1px;background:var(--border)}
.transport-step{display:flex;gap:12px;margin-bottom:13px;align-items:flex-start}
.step-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:5px}
.step-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0}
.step-connector{width:1px;flex:1;background:var(--border);margin:4px 0;min-height:14px}
.step-content{flex:1}
.step-title{font-size:.88rem;font-weight:600;margin-bottom:3px;color:var(--navy);display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.step-desc{font-size:.81rem;color:var(--muted);line-height:1.55}
.step-desc strong{color:var(--navy);font-weight:600}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.02em;color:white}
.badge-m1{background:#D93025}.badge-m2{background:#00A651}.badge-m3{background:#F5C400;color:#1a1a1a}.badge-m5{background:#9B8EC4}.badge-tram{background:var(--navy-mid)}

/* HIGHLIGHTS */
.highlights-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.highlight-item{background:var(--cream);border-radius:10px;padding:11px 12px;font-size:.8rem;border:1px solid var(--cream-dark);color:var(--navy);line-height:1.4}
.highlight-item strong{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-dim);margin-bottom:3px;font-weight:700}

/* MAP BTN */
.btn-map{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--navy);text-decoration:none;padding:13px 20px;border-radius:11px;font-weight:700;font-size:.87rem;margin-top:18px;transition:opacity .2s,transform .2s;letter-spacing:.03em;background:linear-gradient(135deg,var(--gold-light),var(--gold))}
.btn-map:active{opacity:.85;transform:scale(0.98)}

/* DIVIDER */
.divider{height:1px;background:var(--cream-dark);margin:14px 0}

/* TIP BOX */
.tip-box{background:var(--navy);border:1px solid var(--gold-dim);border-radius:var(--radius);padding:18px;margin-top:20px}
.tip-box-title{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;font-weight:700}
.tip-item{display:flex;gap:12px;margin-bottom:0;font-size:.83rem;line-height:1.55;color:rgba(255,255,255,0.78);padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.1);align-items:flex-start}
.tip-item:last-child{border-bottom:none;padding-bottom:0}
.tip-item:first-child{padding-top:0}
.tip-icon{width:28px;height:28px;border-radius:8px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tip-icon i{color:var(--gold);font-size:.75rem}
.tip-item strong{color:var(--gold-light)}
</style>
</head>

/* NUOVA REGOLA PER PORTARE GLI ELEMENTI IN PRIMO PIANO RISPETTO ALLA SFUMATURA SCURA */
.header > * {position:relative; z-index:1}

.logo-wrap{display:flex;justify-content:center;margin-bottom:14px}
.logo-img{width:180px;height:180px;object-fit:contain}

/* COLORE BIANCO PER L'EYEBROW (Guida Ospiti) */
.header-eyebrow{color:var(--white);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:8px;}

/* COLORE BIANCO PER IL TITOLO PRINCIPALE */
.header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,6vw,2.6rem);font-weight:700;color:var(--white);line-height:1.1;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.9),0 0 30px rgba(0,0,0,0.8)}

.header-address{font-size:.8rem;color:rgba(255,255,255,0.7);font-weight:300;letter-spacing:.06em}
.gold-line{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 0}
